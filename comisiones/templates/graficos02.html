{% extends "base.html" %}
{% load l10n %}
{% block content %}

<h2>Facturación trimestral en USD</h2>


<form method="get" style="margin-bottom:25px;">

    <div style="margin-bottom:15px;">

        <label style="font-weight:bold;">Top N:</label>
        <input type="number"
               name="top"
               min="1"
               value="{{ top_n }}"
               style="width:70px; margin-right:20px;">

        <label style="font-weight:bold;">Participación Tope (%):</label>
        <input type="number"
               step="0.1"
               min="0"
               max="100"
               name="tope"
               value="{{ tope|unlocalize }}"
               style="width:90px;">

    </div>

    <div style="margin-bottom:15px;">
        <strong>Seleccionar años:</strong><br><br>

        {% for anio in anios_disponibles %}
            <label style="margin-right:15px;">
                <input type="checkbox"
                       name="anio"
                       value="{{ anio|unlocalize }}"
                       {% if anio in anios_seleccionados %}checked{% endif %}>
                {{ anio|unlocalize }}
            </label>
        {% endfor %}
    </div>

    <button type="submit"
            style="padding:6px 14px;
                   background:#2c78be;
                   color:white;
                   border:none;
                   border-radius:5px;">
        Actualizar
    </button>

</form>

{% if grafico %}
    <div style="background:white;
                padding:20px;
                border-radius:8px;
                box-shadow:0 3px 8px rgba(0,0,0,0.1);">
        <img src="data:image/png;base64,{{ grafico }}"
             style="width:100%;">
    </div>
{% else %}
    <p>No hay datos para mostrar.</p>
{% endif %}

{% endblock %}
